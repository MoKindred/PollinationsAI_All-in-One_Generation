<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollinations AI 全能生成</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
:root {
  --p: #4F46E5;
  --p-hover: #4338CA;
  --bg: #0F172A;
  --card: #1E293B;
  --text: #F1F5F9;
  --gray: #94A3B8;
  --radius: 12px;
}
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 900px;
  margin: 0 auto;
}
/* 语言切换按钮样式 */
.lang-switch {
  text-align: right;
  margin-bottom: 16px;
}
.lang-btn {
  padding: 6px 12px;
  background: var(--card);
  color: var(--text);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  margin-left: 8px;
  transition: 0.2s;
}
.lang-btn.active {
  background: var(--p);
  color: white;
}
.lang-btn:hover {
  background: #273449;
}
.header {
  text-align: center;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 26px;
  margin-bottom: 8px;
  color: #fff;
}
.header p {
  color: var(--gray);
}
.api-box {
  background: var(--card);
  padding: 16px;
  border-radius: var(--radius);
  margin-bottom: 20px;
}
.api-box label {
  font-size: 14px;
  color: var(--gray);
  display: block;
  margin-bottom: 6px;
}
.api-box input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: none;
  background: #273449;
  color: #fff;
  font-size: 15px;
}
.api-box .btn-test {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
.api-box .btn-test:hover {
  background: #1d4ed8;
}
.api-box .test-status {
  margin-top: 8px;
  font-size: 12px;
  padding: 6px;
  border-radius: 4px;
  display: none;
}
.api-box .test-success {
  background: #166534;
  color: #dcfce7;
  display: block;
}
.api-box .test-error {
  background: #dc2626;
  color: #fee2e2;
  display: block;
}
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.tab {
  padding: 10px 16px;
  background: var(--card);
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: 0.2s;
}
.tab.active {
  background: var(--p);
  color: white;
}
/* 模型选择样式 */
.model-selector {
  background: var(--card);
  padding: 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  display: none;
}
.model-selector.active {
  display: block;
}
.model-selector label {
  font-size: 14px;
  color: var(--gray);
  display: block;
  margin-bottom: 8px;
}
.model-select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: none;
  background: #273449;
  color: #fff;
  font-size: 15px;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394A3B8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
  padding-right: 40px;
}
/* 模型元数据详情面板 */
.model-metadata {
  background: #273449;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 12px;
  color: var(--gray);
  max-height: 200px;
  overflow-y: auto;
}
.model-metadata h4 {
  color: var(--text);
  font-size: 13px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.model-metadata .metadata-item {
  margin-bottom: 4px;
  padding: 4px 0;
  border-bottom: 1px solid #334155;
}
.model-metadata .metadata-key {
  color: #94A3B8;
  font-weight: 500;
}
.model-metadata .metadata-value {
  color: #F1F5F9;
  margin-left: 4px;
}
.input-box {
  background: var(--card);
  padding: 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
}
.prompt {
  width: 100%;
  min-height: 100px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #273449;
  color: #fff;
  resize: vertical;
  font-size: 15px;
}
/* 高级参数设置 */
.advanced-params {
  background: #273449;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;
  display: none;
}
.advanced-params.active {
  display: block;
}
.param-row {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.param-item {
  flex: 1;
  min-width: 120px;
}
.param-item label {
  font-size: 12px;
  color: var(--gray);
  margin-bottom: 4px;
  display: block;
}
.param-item input, .param-item select {
  width: 100%;
  padding: 6px 8px;
  border-radius: 6px;
  border: none;
  background: #1E293B;
  color: #fff;
  font-size: 14px;
}
.advanced-toggle {
  font-size: 13px;
  color: var(--p);
  cursor: pointer;
  margin-top: 8px;
  display: inline-block;
}
.btn-generate {
  width: 100%;
  padding: 14px;
  background: var(--p);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}
.btn-generate:hover {
  background: var(--p-hover);
}
.btn-generate:disabled {
  background: #334155;
  cursor: not-allowed;
}
.result {
  margin-top: 20px;
  background: var(--card);
  padding: 16px;
  border-radius: var(--radius);
  min-height: 120px;
}
.result img, .result video, .result audio {
  max-width: 100%;
  border-radius: 8px;
  margin-top: 10px;
}
.result a {
  color: var(--p);
  text-decoration: none;
  margin-top: 8px;
  display: inline-block;
}
.loading {
  color: var(--gray);
  padding: 20px;
  text-align: center;
}
.error {
  color: #EF4444;
  padding: 12px;
}
/* 响应式优化 */
@media (max-width: 600px) {
  .param-row {
    flex-direction: column;
    gap: 8px;
  }
  .param-item {
    min-width: 100%;
  }
}
</style>
</head>
<body>
<div class="container">
  <!-- 语言切换按钮 -->
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">English</button>
  </div>

  <div class="header">
    <h1 data-lang-key="title">Pollinations AI 全能生成</h1>
    <p data-lang-key="subtitle">文本｜图片｜视频｜音频｜语音 一站式生成（官方API版）</p>
  </div>

  <div class="api-box">
    <label data-lang-key="api_key_label">API Key（从 enter.pollinations.ai 获取）</label>
    <input type="password" id="apiKey" placeholder="pk_xxx 或 sk_xxx" data-lang-placeholder="api_key_placeholder">
    <button class="btn-test" id="testApi" data-lang-key="test_api_btn">🔍 测试并加载模型列表</button>
    <div class="test-status" id="testStatus"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-type="text" data-lang-key="tab_text">💬 文本</div>
    <div class="tab" data-type="image" data-lang-key="tab_image">🖼️ 图片</div>
    <div class="tab" data-type="video" data-lang-key="tab_video">🎬 视频</div>
    <div class="tab" data-type="audio" data-lang-key="tab_audio">🔊 音频</div>
  </div>

  <!-- 文本模型选择 -->
  <div class="model-selector active" id="text-models">
    <label data-lang-key="text_model_label">文本生成模型</label>
    <select class="model-select" id="text-model">
      <option value="" data-lang-key="select_model_default">请先测试API连接</option>
    </select>
    <!-- 模型元数据面板 -->
    <div class="model-metadata" id="text-metadata">
      <h4 data-lang-key="model_details">📋 模型详情</h4>
      <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
    </div>
  </div>

  <!-- 图片模型选择 -->
  <div class="model-selector" id="image-models">
    <label data-lang-key="image_model_label">图片生成模型</label>
    <select class="model-select" id="image-model">
      <option value="" data-lang-key="select_model_default">请先测试API连接</option>
    </select>
    <!-- 模型元数据面板 -->
    <div class="model-metadata" id="image-metadata">
      <h4 data-lang-key="model_details">📋 模型详情</h4>
      <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
    </div>
  </div>

  <!-- 视频模型选择 -->
  <div class="model-selector" id="video-models">
    <label data-lang-key="video_model_label">视频生成模型</label>
    <select class="model-select" id="video-model">
      <option value="" data-lang-key="select_model_default">请先测试API连接</option>
    </select>
    <!-- 模型元数据面板 -->
    <div class="model-metadata" id="video-metadata">
      <h4 data-lang-key="model_details">📋 模型详情</h4>
      <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
    </div>
  </div>

  <!-- 音频模型选择 -->
  <div class="model-selector" id="audio-models">
    <label data-lang-key="audio_model_label">音频生成模型</label>
    <select class="model-select" id="audio-model">
      <option value="" data-lang-key="select_model_default">请先测试API连接</option>
    </select>
    <!-- 模型元数据面板 -->
    <div class="model-metadata" id="audio-metadata">
      <h4 data-lang-key="model_details">📋 模型详情</h4>
      <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
    </div>
  </div>

  <div class="input-box">
    <textarea class="prompt" id="prompt" placeholder="输入你的提示词..." data-lang-placeholder="prompt_placeholder"></textarea>
    <div class="advanced-toggle" id="advanced-toggle" data-lang-key="advanced_settings">⚙️ 高级设置</div>
    
    <!-- 高级参数设置 -->
    <div class="advanced-params" id="advanced-params">
      <!-- 文本参数 -->
      <div class="param-row" id="text-params">
        <div class="param-item">
          <label data-lang-key="temperature_label">温度值 (Temperature)</label>
          <input type="number" id="text-temp" value="0.7" min="0" max="2" step="0.1">
        </div>
        <div class="param-item">
          <label data-lang-key="max_tokens_label">最大长度 (Max Tokens)</label>
          <input type="number" id="text-tokens" value="2000" min="100" max="4000">
        </div>
        <div class="param-item">
          <label data-lang-key="role_label">角色</label>
          <select id="text-role">
            <option value="user" data-lang-key="role_user">用户</option>
            <option value="system" data-lang-key="role_system">系统</option>
            <option value="assistant" data-lang-key="role_assistant">助手</option>
          </select>
        </div>
      </div>

      <!-- 图片参数 -->
      <div class="param-row" id="image-params" style="display: none;">
        <div class="param-item">
          <label data-lang-key="width_label">宽度</label>
          <input type="number" id="image-width" value="1024" min="256" max="4096">
        </div>
        <div class="param-item">
          <label data-lang-key="height_label">高度</label>
          <input type="number" id="image-height" value="1024" min="256" max="4096">
        </div>
        <div class="param-item">
          <label data-lang-key="style_label">风格</label>
          <select id="image-style">
            <option value="" data-lang-key="style_default">默认</option>
            <option value="photorealistic" data-lang-key="style_photorealistic">写实</option>
            <option value="anime" data-lang-key="style_anime">动漫</option>
            <option value="digital-art" data-lang-key="style_digital_art">数字艺术</option>
            <option value="3d" data-lang-key="style_3d">3D</option>
            <option value="oil-painting" data-lang-key="style_oil_painting">油画</option>
          </select>
        </div>
      </div>

      <!-- 视频参数 -->
      <div class="param-row" id="video-params" style="display: none;">
        <div class="param-item">
          <label data-lang-key="duration_label">时长 (秒)</label>
          <input type="number" id="video-duration" value="10" min="2" max="60">
        </div>
        <div class="param-item">
          <label data-lang-key="resolution_label">分辨率</label>
          <select id="video-res">
            <option value="720p" data-lang-key="res_720p">720p</option>
            <option value="1080p" selected data-lang-key="res_1080p">1080p</option>
            <option value="4k" data-lang-key="res_4k">4K (预览)</option>
          </select>
        </div>
        <div class="param-item">
          <label data-lang-key="fps_label">帧率</label>
          <input type="number" id="video-fps" value="24" min="10" max="60">
        </div>
      </div>

      <!-- 音频参数 -->
      <div class="param-row" id="audio-params" style="display: none;">
        <div class="param-item">
          <label data-lang-key="duration_label">时长 (秒)</label>
          <input type="number" id="audio-duration" value="30" min="5" max="300">
        </div>
        <div class="param-item">
          <label data-lang-key="voice_label">语音</label>
          <select id="audio-voice">
            <option value="nova" data-lang-key="voice_nova">Nova (默认)</option>
            <option value="rachel" data-lang-key="voice_rachel">Rachel</option>
            <option value="dave" data-lang-key="voice_dave">Dave</option>
            <option value="samantha" data-lang-key="voice_samantha">Samantha</option>
            <option value="chinese-female" data-lang-key="voice_chinese_female">中文女声</option>
            <option value="chinese-male" data-lang-key="voice_chinese_male">中文男声</option>
          </select>
        </div>
        <div class="param-item">
          <label data-lang-key="format_label">格式</label>
          <select id="audio-format">
            <option value="mp3" data-lang-key="format_mp3">MP3</option>
            <option value="wav" data-lang-key="format_wav">WAV</option>
            <option value="ogg" data-lang-key="format_ogg">OGG</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="generate" disabled data-lang-key="generate_btn">🚀 立即生成</button>

  <div class="result" id="result"></div>
</div>

// 语言切换函数
function switchLanguage(lang) {
  currentLang = lang;
  
  // 更新按钮状态
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  
  // 更新静态文本
  document.querySelectorAll('[data-lang-key]').forEach(el => {
    const key = el.dataset.langKey;
    if (translations[lang][key]) {
      el.textContent = translations[lang][key];
    }
  });
  
  // 更新占位符
  document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
    const key = el.dataset.langPlaceholder;
    if (translations[lang][key]) {
      el.placeholder = translations[lang][key];
    }
  });
  
  // 更新模型选择器中的默认选项
  document.querySelectorAll('.model-select option[value=""]').forEach(el => {
    el.textContent = translations[lang].select_model_default;
  });
  
  // 更新模型元数据面板默认文本
  document.querySelectorAll('.model-metadata h4').forEach(el => {
    el.textContent = translations[lang].model_details;
  });
  document.querySelectorAll('.model-metadata div[data-lang-key="select_model_to_view"]').forEach(el => {
    el.textContent = translations[lang].select_model_to_view;
  });
  
  // 更新生成按钮文本
  document.getElementById('generate').textContent = translations[lang].generate_btn;
  
  // 更新模型元数据显示（如果已选择模型）
  updateModelMetadata(currentType);
}

// 绑定语言切换事件
document.querySelectorAll('.lang-btn').forEach(btn => {

// 测试API并加载模型列表
document.getElementById("testApi").addEventListener("click", async () => {
  const key = document.getElementById("apiKey").value.trim();
  const testStatus = document.getElementById("testStatus");
  const generateBtn = document.getElementById("generate");
  
  // 验证API Key
  if (!key) {
    testStatus.className = "test-status test-error";
    testStatus.textContent = translations[currentLang].test_error_empty;
    return;
  }
  
  // 显示加载状态
  testStatus.className = "test-status test-success";
  testStatus.textContent = translations[currentLang].test_connecting;
  document.getElementById("testApi").disabled = true;
  generateBtn.disabled = true;
  
  try {
    // 1. 先测试API连通性（调用通用模型列表接口）
    const testResponse = await fetch(`${base}/models`, {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${key}`,
        "Content-Type": "application/json"
      },
      timeout: 10000
    });
    
    if (!testResponse.ok) {
      throw new Error(`API verification failed: ${testResponse.status} ${testResponse.statusText}`);
    }
    
    // 2. 按类型加载各模块的模型列表（严格遵循官方文档的接口）
    const modelTypes = ["text", "image", "video", "audio"];
    for (const type of modelTypes) {
      try {
        const modelResponse = await fetch(`${base}${modelEndpoints[type]}`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${key}`,
            "Content-Type": "application/json"
          },
          timeout: 10000
        });
        
        if (modelResponse.ok) {
          const models = await modelResponse.json();
          // 修复：存储完整元数据
          allModelsMetadata[type] = processModelMetadata(models);
          // 填充模型列表
          populateModelList(`${type}-model`, allModelsMetadata[type], type);
        } else {
          // 如果特定类型模型接口失败，使用备用默认列表（兼容官方文档）
          console.warn(`Failed to load ${type} model list, using default list`);
          const defaultModels = getDefaultModelsWithMetadata(type);
          allModelsMetadata[type] = defaultModels;
          populateModelList(`${type}-model`, defaultModels, type);
        }
      } catch (e) {
        // 容错处理：单个类型加载失败不影响整体
        console.warn(`Error loading ${type} model list:`, e);
        const defaultModels = getDefaultModelsWithMetadata(type);
        allModelsMetadata[type] = defaultModels;
        populateModelList(`${type}-model`, defaultModels, type);
      }
    }
    
    // 标记API有效
    apiKeyValid = true;
    testStatus.className = "test-status test-success";
    testStatus.textContent = translations[currentLang].test_success;
    generateBtn.disabled = false;
    
    // 初始化显示文本模型元数据
    updateModelMetadata("text");
    
  } catch (e) {
    // 错误处理
    apiKeyValid = false;
    testStatus.className = "test-status test-error";
    testStatus.textContent = `❌ ${e.message}`;
    generateBtn.disabled = true;
    
    // 清空所有模型选择器
    modelTypes.forEach(type => {
      const select = document.getElementById(`${type}-model`);
      select.innerHTML = `<option value="">${translations[currentLang].select_model_default}: ${e.message}</option>`;
      document.getElementById(`${type}-metadata`).innerHTML = `<h4>${translations[currentLang].model_details}</h4><div class="error">Loading failed: ${e.message}</div>`;
    });
  } finally {
    document.getElementById("testApi").disabled = false;
  }
});

// 处理模型元数据（兼容官方返回的多种格式）
function processModelMetadata(models) {
  const metadata = {};
  
  // 情况1: 数组格式 ["model1", "model2"]
  if (Array.isArray(models)) {
    models.forEach(modelId => {
      metadata[modelId] = {
        id: modelId,
        name: modelId,
        pricing: translations[currentLang].pricing + ": N/A",
        capabilities: "Basic generation capabilities",
        metadata: {
          type: modelId.includes("flux") ? "image" : 
                modelId.includes("sd") ? "image" :
                modelId.includes("gpt") ? "text" :
                modelId.includes("music") ? "audio" : "video",
          status: "available"
        }
      };
    });
  }
  // 情况2: OpenAI格式 { data: [{ id: "model1", ... }] }
  else if (models.data && Array.isArray(models.data)) {
    models.data.forEach(item => {
      metadata[item.id] = {
        id: item.id,
        name: item.name || item.id,
        pricing: item.pricing || translations[currentLang].pricing + ": N/A",
        capabilities: item.capabilities || "Not specified",
        metadata: item.metadata || {}
      };
    });
  }
  // 情况3: 对象格式 { "model1": { ... }, ... }
  else if (typeof models === "object" && models !== null) {
    Object.entries(models).forEach(([key, value]) => {
      metadata[key] = {
        id: key,
        name: value.name || key,
        pricing: value.pricing || translations[currentLang].pricing + ": N/A",
        capabilities: value.capabilities || "Not specified",
        metadata: value.metadata || {}
      };
    });
  }
  
  return metadata;
}

  return defaultModels[type] || {};
}

// 填充从API获取的模型列表
function populateModelList(selectId, modelsMetadata, type) {
  const select = document.getElementById(selectId);
  select.innerHTML = "";
  
  // 添加默认选项
  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = translations[currentLang].select_model_default;
  select.appendChild(defaultOption);
  
  // 添加模型选项
  const modelKeys = Object.keys(modelsMetadata);
  if (modelKeys.length > 0) {
    modelKeys.forEach(modelId => {
      const model = modelsMetadata[modelId];
      const option = document.createElement("option");
      option.value = modelId;
      option.textContent = model.name || modelId;
      select.appendChild(option);
    });
  } else {
    // 如果没有获取到模型，使用默认列表
    const defaultModels = getDefaultModelsWithMetadata(type);
    Object.keys(defaultModels).forEach(modelId => {
      const model = defaultModels[modelId];
      const option = document.createElement("option");
      option.value = modelId;
      option.textContent = model.name || modelId;
      select.appendChild(option);
    });
  }
  
  // 添加模型选择事件监听
  select.addEventListener("change", () => {
    updateModelMetadata(type);
  });
}

// 更新模型元数据显示
function updateModelMetadata(type) {
  const modelSelect = document.getElementById(`${type}-model`);
  const metadataPanel = document.getElementById(`${type}-metadata`);
  const selectedModelId = modelSelect.value;
  const t = currentLang;
  
  if (!selectedModelId || !allModelsMetadata[type][selectedModelId]) {
    metadataPanel.innerHTML = `
      <h4>${translations[t].model_details}</h4>
      <div>${translations[t].select_model_to_view_details}</div>
    `;
    return;
  }
  
  const model = allModelsMetadata[type][selectedModelId];
  
  // 构建元数据HTML
  let metadataHtml = `<h4>${translations[t].model_details}: ${model.name || model.id}</h4>`;
  
  // 基础信息
  metadataHtml += `
    <div class="metadata-item">
      <span class="metadata-key">${translations[t].model_id}:</span>
      <span class="metadata-value">${model.id}</span>
    </div>
    <div class="metadata-item">
      <span class="metadata-key">${translations[t].pricing}:</span>
      <span class="metadata-value">${model.pricing || translations[t].pricing + ": N/A"}</span>
    </div>
    <div class="metadata-item">
      <span class="metadata-key">${translations[t].capabilities}:</span>
      <span class="metadata-value">${model.capabilities || "Not specified"}</span>
    </div>
  `;
  
  // 详细元数据
  if (model.metadata && Object.keys(model.metadata).length > 0) {
    metadataHtml += `<div class="metadata-item"><span class="metadata-key">${translations[t].metadata}:</span></div>`;
    Object.entries(model.metadata).forEach(([key, value]) => {
      let displayValue = value;
      if (Array.isArray(value)) {
        displayValue = value.join(", ");
      } else if (typeof value === "object" && value !== null) {
        displayValue = JSON.stringify(value);
      }
      
      metadataHtml += `
        <div class="metadata-item" style="padding-left: 10px;">
          <span class="metadata-key">${key}:</span>
          <span class="metadata-value">${displayValue}</span>
        </div>
      `;
    });
  }
  
  metadataPanel.innerHTML = metadataHtml;
}

// 生成按钮点击事件
document.getElementById("generate").addEventListener("click", async () => {
  const key = document.getElementById("apiKey").value.trim();
  const prompt = document.getElementById("prompt").value.trim();
  const res = document.getElementById("result");
  const t = currentLang;

  // 前置验证
  if (!apiKeyValid) {
    res.innerHTML = `<div class="error">${translations[t].error_api_required}</div>`;
    return;
  }
  if (!key) {
    res.innerHTML = `<div class="error">${translations[t].error_api_empty}</div>`;
    return;
  }
  if (!prompt) {
    res.innerHTML = `<div class="error">${translations[t].error_prompt_empty}</div>`;
    return;
  }

  // 获取当前选择的模型
  const modelSelect = document.getElementById(`${currentType}-model`);
  const selectedModel = modelSelect.value;
  
  if (!selectedModel) {
    res.innerHTML = `<div class="error">${translations[t].error_model_required}</div>`;
    return;
  }

  const btn = document.getElementById("generate");
  btn.disabled = true;
  btn.textContent = translations[t].generate_btn.replace("🚀 ", "") + "ing...";
  
  // 根据类型显示不同的加载文本
  let loadingText = "";
  switch(currentType) {
    case "text": loadingText = translations[t].generating_text; break;
    case "image": loadingText = translations[t].generating_image; break;
    case "video": loadingText = translations[t].generating_video; break;
    case "audio": loadingText = translations[t].generating_audio; break;
  }
  res.innerHTML = `<div class="loading">${loadingText}</div>`;

  try {
    if (currentType === "text") {
      // 文本生成 - 严格遵循OpenAI兼容接口规范
      const temperature = parseFloat(document.getElementById("text-temp").value);
      const maxTokens = parseInt(document.getElementById("text-tokens").value);
      const role = document.getElementById("text-role").value;

      const r = await fetch(`${base}${generateEndpoints.text}`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${key}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: selectedModel,
          messages: [{ 
            role: role, 
            content: prompt 
          }],
          temperature: temperature,
          max_tokens: maxTokens
        })
      });

      if (!r.ok) {
        throw new Error(`API request failed: ${r.status} ${r.statusText}`);
      }

      const d = await r.json();
      res.innerHTML = `
        <div style="white-space: pre-wrap; line-height: 1.6;">${d.choices?.[0]?.message?.content || translations[t].no_result}</div>
        <div style="margin-top: 10px; font-size: 12px; color: var(--gray);">
          ${translations[t].using_model}: ${selectedModel} | ${translations[t].temperature}: ${temperature} | ${translations[t].max_tokens}: ${maxTokens}
        </div>
      `;
    } 
    else if (currentType === "image") {
      // 图片生成 - 严格遵循官方/image接口规范
      const width = document.getElementById("image-width").value;
      const height = document.getElementById("image-height").value;
      const style = document.getElementById("image-style").value;
      
      // 构建参数（完全匹配官方文档的参数名）
      let imageParams = new URLSearchParams({
        width: width,
        height: height,
        model: selectedModel,
        key: key
      });
      
      if (style) imageParams.append("style", style);
      
      const encodedPrompt = encodeURIComponent(prompt);
      const url = `${base}${generateEndpoints.image}/${encodedPrompt}?${imageParams.toString()}`;
      
      res.innerHTML = `
        <div style="color: var(--gray); margin-bottom: 10px;">${translations[t].using_model}: ${selectedModel} | ${translations[t].dimensions}: ${width}x${height}</div>
        <img src="${url}" alt="${t === 'zh' ? 'Pollinations生成图片' : 'Pollinations Generated Image'}" loading="lazy">
        <a href="${url}" target="_blank" download>${translations[t].download_image}</a>
      `;
    } 
    else if (currentType === "video") {
      // 视频生成 - 严格遵循官方/video接口规范
      const duration = document.getElementById("video-duration").value;
      const resolution = document.getElementById("video-res").value;
      const fps = document.getElementById("video-fps").value;
      
      let videoParams = new URLSearchParams({
        duration: duration,
        resolution: resolution,
        fps: fps,
        model: selectedModel,
        key: key
      });
      
      const encodedPrompt = encodeURIComponent(prompt);
      const url = `${base}${generateEndpoints.video}/${encodedPrompt}?${videoParams.toString()}`;
      
      res.innerHTML = `
        <div style="color: var(--gray); margin-bottom: 10px;">${translations[t].using_model}: ${selectedModel} | ${translations[t].duration}: ${duration}s | ${translations[t].resolution}: ${resolution} | ${translations[t].fps}: ${fps}</div>
        <video controls src="${url}" poster="https://pollinations.ai/p/${encodedPrompt}?width=640&height=360">
          ${translations[t].browser_not_support_video}
        </video>
        <a href="${url}" target="_blank" download>${translations[t].download_video}</a>
      `;
    } 
    else if (currentType === "audio") {
      // 音频生成 - 严格遵循官方/audio接口规范
      const duration = document.getElementById("audio-duration").value;
      const voice = document.getElementById("audio-voice").value;
      const format = document.getElementById("audio-format").value;
      
      let audioParams = new URLSearchParams({
        duration: duration,
        voice: voice,
        format: format,
        model: selectedModel,
        key: key
      });
      
      const encodedPrompt = encodeURIComponent(prompt);
      const url = `${base}${generateEndpoints.audio}/${encodedPrompt}?${audioParams.toString()}`;
      
      res.innerHTML = `
        <div style="color: var(--gray); margin-bottom: 10px;">${translations[t].using_model}: ${selectedModel} | ${translations[t].duration}: ${duration}s | ${translations[t].voice}: ${voice} | ${translations[t].format}: ${format}</div>
        <audio controls src="${url}">
          ${translations[t].browser_not_support_audio}
        </audio>
        <a href="${url}" target="_blank" download>${translations[t].download_audio}</a>
      `;
    }
  } catch (e) {
    res.innerHTML = `<div class="error">❌ ${translations[t].generating_failed}：${e.message}</div>`;
    console.error("Generation error:", e);
  } finally {
    btn.disabled = false;
    btn.textContent = translations[t].generate_btn;
  }
});

// 初始化 - 显示文本参数
document.getElementById("text-params").style.display = "flex";
</script>
