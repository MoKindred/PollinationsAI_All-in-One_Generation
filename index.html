<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollinations AI 全能生成</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="left-panel">
    <!-- 语言切换按钮 -->
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="header">
      <h1 data-lang-key="title">Pollinations AI 全能生成</h1>
      <p data-lang-key="subtitle">文本｜图片｜视频｜音频｜语音 一站式生成（官方API版）</p>
    </div>

    <div class="api-box">
      <label data-lang-key="api_key_label">API Key（从 enter.pollinations.ai 获取）</label>
      <input type="password" id="apiKey" placeholder="pk_xxx 或 sk_xxx" data-lang-placeholder="api_key_placeholder">
      <div style="display: flex; gap: 8px; margin-top: 8px;">
        <button class="btn-test" id="testApi" style="flex: 2;" data-lang-key="test_api_btn">🔍 测试并加载模型列表</button>
        <button class="btn-test" id="getApiKey" style="flex: 1; background: #10b981;" data-lang-key="get_api_key_btn">🔑 获取API Key</button>
      </div>
      <div class="test-status" id="testStatus"></div>
    </div>

    <div class="tabs">
      <div class="tab active" data-type="text" data-lang-key="tab_text">💬 文本</div>
      <div class="tab" data-type="image" data-lang-key="tab_image">🖼️ 图片</div>
      <div class="tab" data-type="video" data-lang-key="tab_video">🎬 视频</div>
      <div class="tab" data-type="audio" data-lang-key="tab_audio">🔊 音频</div>
    </div>

    <!-- 文本模型选择 -->
    <div class="model-selector active" id="text-models">
      <label data-lang-key="text_model_label">文本生成模型</label>
      <select class="model-select" id="text-model">
        <option value="" data-lang-key="select_model_default">请先测试API连接</option>
      </select>
      <!-- 模型元数据面板 -->
      <div class="model-metadata" id="text-metadata">
        <h4 data-lang-key="model_details">📋 模型详情</h4>
        <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
      </div>
    </div>

    <!-- 图片模型选择 -->
    <div class="model-selector" id="image-models">
      <label data-lang-key="image_model_label">图片生成模型</label>
      <select class="model-select" id="image-model">
        <option value="" data-lang-key="select_model_default">请先测试API连接</option>
      </select>
      <!-- 模型元数据面板 -->
      <div class="model-metadata" id="image-metadata">
        <h4 data-lang-key="model_details">📋 模型详情</h4>
        <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
      </div>
    </div>

    <!-- 视频模型选择 -->
    <div class="model-selector" id="video-models">
      <label data-lang-key="video_model_label">视频生成模型</label>
      <select class="model-select" id="video-model">
        <option value="" data-lang-key="select_model_default">请先测试API连接</option>
      </select>
      <!-- 模型元数据面板 -->
      <div class="model-metadata" id="video-metadata">
        <h4 data-lang-key="model_details">📋 模型详情</h4>
        <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
      </div>
    </div>

    <!-- 音频模型选择 -->
    <div class="model-selector" id="audio-models">
      <label data-lang-key="audio_model_label">音频生成模型</label>
      <select class="model-select" id="audio-model">
        <option value="" data-lang-key="select_model_default">请先测试API连接</option>
      </select>
      <!-- 模型元数据面板 -->
      <div class="model-metadata" id="audio-metadata">
        <h4 data-lang-key="model_details">📋 模型详情</h4>
        <div data-lang-key="select_model_to_view">请选择模型查看详细信息</div>
      </div>
    </div>

    <div class="input-box">
      <textarea class="prompt" id="prompt" placeholder="输入你的提示词..." data-lang-placeholder="prompt_placeholder"></textarea>
      <div class="advanced-toggle" id="advanced-toggle" data-lang-key="advanced_settings">⚙️ 高级设置</div>
      
      <!-- 高级参数设置 -->
      <div class="advanced-params" id="advanced-params">
        <!-- 文本参数 -->
        <div class="param-row" id="text-params">
          <div class="param-item">
            <label data-lang-key="temperature_label">温度值 (Temperature)</label>
            <input type="number" id="text-temp" value="0.7" min="0" max="2" step="0.1">
          </div>
          <div class="param-item">
            <label data-lang-key="max_tokens_label">最大长度 (Max Tokens)</label>
            <input type="number" id="text-tokens" value="2000" min="100" max="4000">
          </div>
          <div class="param-item">
            <label data-lang-key="role_label">角色</label>
            <select id="text-role">
              <option value="user" data-lang-key="role_user">用户</option>
              <option value="system" data-lang-key="role_system">系统</option>
              <option value="assistant" data-lang-key="role_assistant">助手</option>
            </select>
          </div>
        </div>

        <!-- 图片参数 -->
        <div class="param-row" id="image-params" style="display: none;">
          <div class="param-item">
            <label data-lang-key="width_label">宽度</label>
            <input type="number" id="image-width" value="1024" min="64" max="4096" step="64">
          </div>
          <div class="param-item">
            <label data-lang-key="height_label">高度</label>
            <input type="number" id="image-height" value="1024" min="64" max="4096" step="64">
          </div>
          <div class="param-item">
            <label data-lang-key="style_label">风格</label>
            <select id="image-style">
              <option value="" data-lang-key="style_default">默认</option>
              <option value="photorealistic" data-lang-key="style_photorealistic">写实</option>
              <option value="anime" data-lang-key="style_anime">动漫</option>
              <option value="digital-art" data-lang-key="style_digital_art">数字艺术</option>
              <option value="3d" data-lang-key="style_3d">3D</option>
              <option value="oil-painting" data-lang-key="style_oil_painting">油画</option>
            </select>
          </div>
          <div class="param-item">
            <label data-lang-key="negative_prompt_label">负面提示词</label>
            <input type="text" id="image-negative" placeholder="不希望出现的内容">
          </div>
          <div class="param-item" id="param-image-quality">
            <label data-lang-key="quality_label">质量</label>
            <select id="image-quality">
              <option value="" data-lang-key="quality_standard">标准</option>
              <option value="hd" data-lang-key="quality_hd">高清</option>
              <option value="ultra" data-lang-key="quality_ultra">超高清</option>
            </select>
          </div>
          <div class="param-item">
            <label data-lang-key="seed_label">种子值</label>
            <input type="number" id="image-seed" placeholder="随机种子">
          </div>
          <div class="param-item">
            <label data-lang-key="enhance_label">增强</label>
            <input type="checkbox" id="image-enhance">
          </div>
          <div class="param-item">
            <label data-lang-key="transparent_label">透明背景</label>
            <input type="checkbox" id="image-transparent">
          </div>
        </div>

        <!-- 视频参数 -->
        <div class="param-row" id="video-params" style="display: none;">
          <div class="param-item">
            <label data-lang-key="duration_label">时长 (秒)</label>
            <input type="number" id="video-duration" value="5" min="2" max="60">
          </div>
          <div class="param-item">
            <label data-lang-key="resolution_label">分辨率</label>
            <select id="video-res">
              <option value="720p" data-lang-key="res_720p">720p</option>
              <option value="1080p" data-lang-key="res_1080p" selected>1080p</option>
              <option value="4k" data-lang-key="res_4k">4K (预览)</option>
            </select>
          </div>
          <div class="param-item">
            <label data-lang-key="fps_label">帧率</label>
            <input type="number" id="video-fps" value="24" min="15" max="60">
          </div>
          <div class="param-item">
            <label data-lang-key="aspect_ratio_label">宽高比</label>
            <select id="video-aspect">
              <option value="16:9" data-lang-key="aspect_16_9" selected>16:9</option>
              <option value="9:16" data-lang-key="aspect_9_16">9:16</option>
            </select>
          </div>
          <div class="param-item">
            <label data-lang-key="audio_label">音频</label>
            <input type="checkbox" id="video-audio" checked>
          </div>
        </div>

        <!-- 音频参数 -->
        <div class="param-row" id="audio-params" style="display: none;">
          <div class="param-item">
            <label data-lang-key="duration_label">时长 (秒)</label>
            <input type="number" id="audio-duration" value="10" min="1" max="300">
          </div>
          <div class="param-item">
            <label data-lang-key="voice_label">语音</label>
            <select id="audio-voice">
              <option value="nova" data-lang-key="voice_nova">Nova (默认)</option>
              <option value="rachel" data-lang-key="voice_rachel">Rachel</option>
              <option value="dave" data-lang-key="voice_dave">Dave</option>
              <option value="samantha" data-lang-key="voice_samantha">Samantha</option>
              <option value="chinese-female" data-lang-key="voice_chinese_female">中文女声</option>
              <option value="chinese-male" data-lang-key="voice_chinese_male">中文男声</option>
              <option value="alloy" data-lang-key="voice_alloy">Alloy</option>
              <option value="echo" data-lang-key="voice_echo">Echo</option>
              <option value="fable" data-lang-key="voice_fable">Fable</option>
              <option value="onyx" data-lang-key="voice_onyx">Onyx</option>
              <option value="shimmer" data-lang-key="voice_shimmer">Shimmer</option>
            </select>
          </div>
          <div class="param-item">
            <label data-lang-key="format_label">格式</label>
            <select id="audio-format">
              <option value="mp3" data-lang-key="format_mp3" selected>MP3</option>
              <option value="wav" data-lang-key="format_wav">WAV</option>
              <option value="ogg" data-lang-key="format_ogg">OGG</option>
              <option value="opus" data-lang-key="format_opus">Opus</option>
              <option value="aac" data-lang-key="format_aac">AAC</option>
              <option value="flac" data-lang-key="format_flac">FLAC</option>
              <option value="pcm" data-lang-key="format_pcm">PCM</option>
            </select>
          </div>
          <div class="param-item">
            <label data-lang-key="speed_label">语速</label>
            <input type="number" id="audio-speed" value="1.0" min="0.5" max="2.0" step="0.1">
          </div>
          <div class="param-item" id="param-audio-instrumental" style="display: flex;">
            <label data-lang-key="instrumental_label">纯音乐</label>
            <input type="checkbox" id="audio-instrumental">
          </div>
        </div>
      </div>

      <button class="btn-generate" id="generate" data-lang-key="generate_btn">🚀 立即生成</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="result" id="result">
      <!-- 生成结果将显示在这里 -->
    </div>
  </div>
</div>

<!-- 页脚 -->
<footer style="max-width: 1200px; margin: 40px auto 20px; padding: 24px; background: var(--glass); backdrop-filter: var(--glass-backdrop); -webkit-backdrop-filter: var(--glass-backdrop); border-radius: var(--radius); text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); transition: all 0.3s ease;">
  <div style="margin-bottom: 16px;">
    <a href="https://pollinations.ai" target="_blank" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); font-weight: bold; font-size: 20px; transition: all 0.3s ease;">
      <span style="background: var(--p-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Pollinations AI</span>
    </a>
  </div>
  <div style="font-size: 14px; color: var(--gray); margin-bottom: 20px;">
    Built with Pollinations AI
  </div>
  <a href="https://pollinations.ai" target="_blank" style="display: inline-block; padding: 10px 20px; background: var(--p-gradient); color: white; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);">
    Visit Official Website
  </a>
</footer>

<script src="script.js"></script>
</body>
</html>
